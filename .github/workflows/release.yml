name: "Build & Release Desktop Apps"

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri App & Publish Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Release v__VERSION__"
          releaseBody: |
            Download the appropriate installer below.

            ### 🚀 What's New in v0.1.5:
            * **CSS & Tailwind Quality Improvements**: Fixed conflicting `block` and `flex` display classes across all form labels in DailyEntryForm, CustomEntryModal, and page components. Updated deprecated gradient syntax from `bg-gradient-to-r` to `bg-linear-to-r` throughout buttons and headers. Replaced arbitrary Tailwind values with standard scale values (`h-[42px]` → `h-10.5`, `w-[42px]` → `w-10.5`, `min-h-[500px]` → `min-h-125`, `flex-2` → `flex-1`). Removed deprecated AdminCustomEntryModal.tsx.
            * **Reusable CustomEntryModal Component**: New `<CustomEntryModal>` with intelligent dual-mode support via `adminMode` prop:
              - **Admin "all data" view**: User selector dropdown to submit backdated entries for any team member
              - **Admin "my data" & Regular users**: Non-editable read-only codename field showing current user
              - Full form validation against target user's allowed file categories
            * **Enhanced Form Validation & Error Handling**: Comprehensive validation with proper null/undefined safety checks. Form submission validates all required fields and checks against target user's category permissions. Clear, user-friendly error messages via toast notifications.
            * **Data Integrity & Code Quality**: Verified userId and profile handling throughout data flow. All async operations include proper error handling. Form validations enforce user permission constraints. Zero ESLint warnings - clean, production-ready codebase.

            ### 📋 Previous Features (v0.1.4):
            * **Excel & PDF Exports**: Download filtered reports of daily and monthly entries.
            * **Dynamic Stats Grid**: Real-time aggregated stats with double-digit padding and percentages.
            * **Active Tab State Persistence**: Remembers user's selected tab across reloads.
            * **Locked Codename & Half-Width Submit**: Prevents user codename changes with modern form layout.
            * **Custom Entry Button**: Admin's custom entry button next to toggle switch.
            * **Permissive RLS Policies**: Admins can submit backdated entries for other users.
            * **Unified Category Selector**: Consistent category selection across forms.
            * **Advanced Filters**: Search, Year, Month, and Specific Date filters integrated into one card.
            * **21-Day Inactivity Auto-Logout**: Automatic security logoff after 21 days of inactivity.
            * **Zero ESLint Warnings**: Clean, production-ready codebase.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
