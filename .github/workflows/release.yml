name: "Build & Release Desktop Apps"

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri App & Publish Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          CI: true
        with:
          tagName: v__VERSION__
          releaseName: "Release v__VERSION__"
          releaseBody: |
            Download the appropriate installer below.

            ### 🚀 What's New in v1.1.0:
            * **Supabase Recovery & RLS Policy Restoration**: Re-enabled and configured Row-Level Security (RLS) on database tables with strict permission checks, correcting blank dashboard loads.
            * **Admin Password Reset Resolution**: Fixed the PostgREST function overloading conflict (`PGRST203`) by dropping the redundant 2-argument `admin_update_user_credentials` function and writing a unified, 3-argument version.
            * **Self-Healing & Cache Pruning Re-enabled**: Safely restored client-side self-healing checks and active database cache pruning functions to keep the IndexedDB cache aligned with the server.
            * **Snappy UI Deletion**: Optimistically delete records from the local browser cache immediately upon successful deletion for instant visual feedback.

            ### 🚀 What's New in v1.0.0:
            * **PostgREST 1000-Row Pagination Fix**: Added paginated block requests (`.range()`) in both delta fetching and active pruning loops. This prevents older entries (3000+ data sets) from going missing on client systems.
            * **Multi-User Cache Isolation**: Added `clearAllCache` triggers in IndexedDB and hooked it to the logout workflow to prevent data mixing between different accounts.
            * **Network Failure Cache Fallback**: Implemented robust failover catching. In cases where the client indicates it is online but has no database connection (dead routers or server drops), the app falls back to loading local cache instead of throwing blank screen errors.
            * **Tauri Service Worker Skip**: Bypassed service worker registrations inside native desktop apps to eliminate console `SecurityError` protocol warnings.
            * **Offline Guards**: Implemented internet connection validation checks to notify users if they attempt to perform server-only admin actions while offline.

            ### 📋 What's New in v0.3.0:
            * **Silent Background Fetching**: Implemented `isSilent` mode in `fetchRecords` to perform database refetches (real-time subscriptions, window focus/visibility changes, network status changes, and user CRUD actions) silently in the background, keeping existing UI content visible and eliminating full-screen loading spinners.

            ### 📋 Previous Features:
            * **User Management Loader (v0.2.9)**: Added loading spinner state to the "User Accounts & File Permissions Management" table when fetching data to prevent showing 0 records initially.
            * **Code Quality, Performance & Accessibility (v0.2.8)**: Extracted duplicate download logic, optimized date range querying, added WebSocket debouncing, fixed modal escape key dismissal, and fixed spinner dimensions.
            * **Offline Startup & Cache Recovery (v0.2.7)**: Local storage profile caching and fallback startup loaders resolve the infinite loading loop.
            * **Global Reload Keyboard Shortcut & Background Auto-Sync (v0.2.6)**: `Cmd+R` / `Ctrl+R` reload and focus/visibility auto-fetch.
            * **macOS Apple Silicon CI Build Fix (v0.2.5)**: `CI: true` bypasses AppleScript Finder UI-styling hangs.
            * **Self-Healing Startup Delay & Fetching Loader States (v0.2.4)**: 200ms init delay, 4s safety net auto-reload, visual loading spinners.
            * **Deferred Update Installation (v0.2.2)**: Download-only in background, install on explicit "Restart to Update" click.
            * **Maximized Startup, Dynamic Downloads, Supabase Build Injection (v0.2.1)**.
            * **Offline Standalone App, Background Auto-Updater, Accurate Percentages (v0.2.0)**.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
