name: "Build & Release Desktop Apps"

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri App & Publish Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Release v__VERSION__"
          releaseBody: |
            Download the appropriate installer below.

            ### 🚀 What's New in v0.1.5:
            * **CSS & Tailwind Quality Improvements**: Fixed conflicting `block` and `flex` display classes across form labels. Updated deprecated gradient syntax from `bg-gradient-to-r` to `bg-linear-to-r`. Replaced arbitrary size values with standard Tailwind scale values (`h-[42px]` → `h-10.5`, `min-h-[500px]` → `min-h-125`). Fixed invalid flex class (`flex-2` → `flex-1`).
            * **Code Cleanup & Component Consolidation**: Removed deprecated `AdminCustomEntryModal.tsx` file after consolidating custom entry functionality into reusable `CustomEntryModal` component with dual-mode support (admin selecting users vs. regular users adding own data).
            * **Reusable CustomEntryModal Component**: New `<CustomEntryModal>` component replaces admin-only functionality with intelligent mode switching. Admin in "all data" view: selects any user from dropdown. Admin in "my data" view: acts like regular user. Regular users: always add own data with non-editable codename. Supports custom-dated entries with validation against target user's allowed categories.
            * **Enhanced Form Validation & Error Handling**: Comprehensive validation for custom entries with proper null/undefined checks. Form submission validates against target user's permissions. Clear error messages for missing users, dates, or form fields.
            * **Data Integrity & User Safety**: Verified proper userId handling in custom entries. Confirmed RLS policies enforce correct data isolation. All async operations include error handling and user-friendly toast notifications.

            ### 📋 Previous Features (v0.1.4):
            * **Excel & PDF Exports**: Download filtered reports of daily and monthly entries.
            * **Dynamic Stats Grid**: Real-time aggregated stats with double-digit padding and percentages.
            * **Active Tab State Persistence**: Remembers user's selected tab across reloads.
            * **Locked Codename & Half-Width Submit**: Prevents user codename changes with modern form layout.
            * **Custom Entry Button**: Admin's custom entry button next to toggle switch.
            * **Permissive RLS Policies**: Admins can submit backdated entries for other users.
            * **Unified Category Selector**: Consistent category selection across forms.
            * **Advanced Filters**: Search, Year, Month, and Specific Date filters integrated into one card.
            * **21-Day Inactivity Auto-Logout**: Automatic security logoff after 21 days of inactivity.
            * **Zero ESLint Warnings**: Clean, production-ready codebase.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
