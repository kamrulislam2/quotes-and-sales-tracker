name: "Build & Release Desktop Apps"

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri App & Publish Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          CI: true
        with:
          tagName: v__VERSION__
          releaseName: "Release v__VERSION__"
          releaseBody: |
            Download the appropriate installer below.

             ### 🚀 What's New in v0.2.7:
            * **Offline Startup & Cache Recovery**: Added local storage user profile caching and fallback startup loaders. If database connection times out or fails (due to a locked WebView/process on Windows relaunch, or network drops), the app recovers using the cached profile to load the dashboard, resolving the infinite loading loop.

             ### 📋 Previous Features:
            * **Global Reload Keyboard Shortcut & Background Auto-Sync (v0.2.6)**: Added keyboard listeners for `Cmd+R` (macOS) and `Ctrl+R` (Windows/Linux) to reload the application window. Added focus and visibility change event listeners to auto-fetch database updates immediately when the app is brought back to the foreground.
            * **macOS Apple Silicon CI Build Fix (v0.2.5)**: Added `CI: true` configuration in the release workflow. This bypasses AppleScript Finder UI-styling steps that hang on headless runners, fixing the macOS aarch64 DMG bundling pipeline freeze.
            * **Self-Healing Startup Delay & Fetching Loader States (v0.2.4)**: Added a 200ms initialization delay before session queries on mount to ensure Webview handles are ready. Implemented a 4-second safety net auto-reload fallback to resolve white screen hangs, and added visual loading spinners during database queries.
            * **Deferred Update Installation (v0.2.2)**: Separated the download and installation steps. The app now only downloads the update payload in the background, leaving the installation task dormant until the user explicitly clicks the "Restart to Update" button. This prevents Windows from closing/installing the app automatically.
            * **Maximized Startup State (v0.2.1)**: Configured the app window to launch fully maximized on startup.
            * **Dynamic Architecture Downloads (v0.2.1)**: Added direct installer download buttons on the Login page and a "Get App" navbar dropdown menu in the dashboard. These buttons query the GitHub API to download the correct installers for Windows, macOS Apple Silicon (M1/M2/M3), or macOS Intel.
            * **Supabase Production Build Injections (v0.2.1)**: Mapped Supabase keys in the release workflow environment to fix database login issues on compiled client builds.
            * **Updater Silence Check (v0.2.1)**: Silenced update check error logs in the background.
            * **Offline Standalone App**: Compiles all frontend Next.js code directly into local static files (`output: 'export'`) and bundles them inside the app. The app runs fully offline and starts instantly, without depending on Vercel or internet connection.
            * **Background Auto-Updater**: Integrated Tauri v2's native updater plugin. The app checks for updates in the background.
            * **Restart to Update UI Banner**: Displays a subtle toast banner in the UI when a new update is downloaded and ready, with a "Restart to Update" button that applies updates instantly using Tauri's native relaunch API.
            * **Accurate Percentage Counts**: Displays stats percentages with 2 decimal places (e.g. `33.11%`). Replaced rounding logic so that low file counts (e.g., 1 or 2 files) display their exact decimal percentage (e.g. `0.05%`) instead of rounding down to `0%`.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
