name: "Build & Release Desktop Apps"

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri App & Publish Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Release v__VERSION__"
          releaseBody: |
            Download the appropriate installer below.

            ### 🚀 What's New in v0.1.6:
            * **Collapsible Sidebar Navigation**: The dashboard sidebar can now collapse into compact icon-only mode, giving Daily Entry, Monthly Entry List, and User Management tables more horizontal room for longer values.
            * **Monthly-only Submitted Date/Time Correction**: Records edited from Monthly Entry List can now correct submitted date and time. Date input uses `DD-MM-YYYY`; time input uses `09:21 PM/AM`. Daily Entry edits keep submitted date/time locked.
            * **Cleaner Table Readability**: Monthly dates now stay on one line with time below. File type badges such as `Individual Review` no longer wrap awkwardly.
            * **Persistent Layout Preference**: Sidebar collapsed/open state is saved in `localStorage`.
            * **Record Update Support**: The record update flow can optionally update `submitted_at` while preserving existing behavior for normal detail edits.
            * **Lint Cleanup**: Removed an unused dashboard import so lint completes cleanly.

            ### 📋 Previous Features:
            * **Reusable CustomEntryModal Component**: Intelligent custom entry modal for admin all-data mode, admin my-data mode, and regular users.
            * **Custom Entry Validation**: Backdated submissions validate required fields and target user's allowed file categories.
            * **Excel & PDF Exports**: Download filtered reports of daily and monthly entries.
            * **Dynamic Stats Grid**: Real-time aggregated stats with double-digit padding and percentages.
            * **Active Tab State Persistence**: Remembers user's selected tab across reloads.
            * **Locked Codename & Half-Width Submit**: Prevents user codename changes with modern form layout.
            * **Custom Entry Button**: Admin's custom entry button next to toggle switch.
            * **Permissive RLS Policies**: Admins can submit backdated entries for other users.
            * **Unified Category Selector**: Consistent category selection across forms.
            * **Advanced Filters**: Search, Year, Month, and Specific Date filters integrated into one card.
            * **21-Day Inactivity Auto-Logout**: Automatic security logoff after 21 days of inactivity.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
