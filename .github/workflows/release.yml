name: "Build & Release Desktop Apps"

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri App & Publish Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: "Release v__VERSION__"
          releaseBody: |
            Download the appropriate installer below.

             ### 🚀 What's New in v0.2.4:
            * **WebView Startup Delay**: Added a 200ms initialization delay before session queries on mount. This ensures the Webview's network and disk cache handles are fully ready before running Supabase checks, preventing startup locks.
            * **Self-Healing Auto-Reload**: Added one-time automatic page refresh fallbacks if a connection check fails or times out (using a 4-second safety net), resolving startup white screen hangs.
            * **Fetching Loader States**: Added visual loading spinner states during database queries instead of displaying "Total Files: 0" and "No records found" while fetching data.

             ### 📋 Previous Features:
            * **Deferred Update Installation (v0.2.2)**: Separated the download and installation steps. The app now only downloads the update payload in the background, leaving the installation task dormant until the user explicitly clicks the "Restart to Update" button. This prevents Windows from closing/installing the app automatically.
            * **Maximized Startup State (v0.2.1)**: Configured the app window to launch fully maximized on startup.
            * **Dynamic Architecture Downloads (v0.2.1)**: Added direct installer download buttons on the Login page and a "Get App" navbar dropdown menu in the dashboard. These buttons query the GitHub API to download the correct installers for Windows, macOS Apple Silicon (M1/M2/M3), or macOS Intel.
            * **Supabase Production Build Injections (v0.2.1)**: Mapped Supabase keys in the release workflow environment to fix database login issues on compiled client builds.
            * **Updater Silence Check (v0.2.1)**: Silenced update check error logs in the background.
            * **Offline Standalone App**: Compiles all frontend Next.js code directly into local static files (`output: 'export'`) and bundles them inside the app. The app runs fully offline and starts instantly, without depending on Vercel or internet connection.
            * **Background Auto-Updater**: Integrated Tauri v2's native updater plugin. The app checks for updates in the background.
            * **Restart to Update UI Banner**: Displays a subtle toast banner in the UI when a new update is downloaded and ready, with a "Restart to Update" button that applies updates instantly using Tauri's native relaunch API.
            * **Accurate Percentage Counts**: Displays stats percentages with 2 decimal places (e.g. `33.11%`). Replaced rounding logic so that low file counts (e.g., 1 or 2 files) display their exact decimal percentage (e.g. `0.05%`) instead of rounding down to `0%`.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
