name: "Build & Release Desktop Apps"

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri App & Publish Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          CI: true
        with:
          tagName: v__VERSION__
          releaseName: "Release v__VERSION__"
          releaseBody: |
            Download the appropriate installer below.

             ### 🚀 What's New in v0.2.8:
            * **Code Quality & Maintainability**: Extracted duplicated GitHub download logic into a shared utility (`downloadHelper.ts`), removed dead `changeOwnPassword` code, and fixed profile fetch using an independent timeout instead of sharing the session timeout.
            * **Optimized Date Queries**: Replaced the paginated all-records fetch in `fetchAvailableDates` with a lightweight min/max date range query (2 rows instead of thousands).
            * **Real-time Debounce**: Added 500ms debounce to real-time record subscription to prevent double-fetching when user mutations echo back via WebSocket.
            * **Modal Escape Key**: All 5 modals now close on `Escape` key press for better accessibility and usability.
            * **Spinner Fix**: Fixed submit button spinner width bug in Daily Entry Form (`w-2` → `w-5`).

             ### 📋 Previous Features:
            * **Offline Startup & Cache Recovery (v0.2.7)**: Local storage profile caching and fallback startup loaders resolve the infinite loading loop.
            * **Global Reload Keyboard Shortcut & Background Auto-Sync (v0.2.6)**: `Cmd+R` / `Ctrl+R` reload and focus/visibility auto-fetch.
            * **macOS Apple Silicon CI Build Fix (v0.2.5)**: `CI: true` bypasses AppleScript Finder UI-styling hangs.
            * **Self-Healing Startup Delay & Fetching Loader States (v0.2.4)**: 200ms init delay, 4s safety net auto-reload, visual loading spinners.
            * **Deferred Update Installation (v0.2.2)**: Download-only in background, install on explicit "Restart to Update" click.
            * **Maximized Startup, Dynamic Downloads, Supabase Build Injection (v0.2.1)**.
            * **Offline Standalone App, Background Auto-Updater, Accurate Percentages (v0.2.0)**.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
