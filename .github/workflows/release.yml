name: "Build & Release Desktop Apps"

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri App & Publish Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          CI: true
        with:
          tagName: v__VERSION__
          releaseName: "Release v__VERSION__"
          releaseBody: |
            Download the appropriate installer below.

            ### 🚀 What's New in v3.0.0 (Major Release):
            * **Quotes Portal Rebrand**: Renamed the sidebar navigation tab from "Quote Rules" to "Quotes Portal" for a clearer, unified identity.
            * **IP Geolocation Checker**: Integrated a built-in IP address lookup tool accessible from the Quotes Portal. Detects the user's public IP automatically and provides geolocation details (city, region, country, ISP, timezone) with a sleek auto-hiding scrollbar UI.
            * **Login Codes Manager**: Added a secure login codes management modal for storing, viewing, copying, and managing company login credentials directly within the Quotes Portal, with role-based edit permissions.
            * **Rules Archive History & Audit Trail**: Built a comprehensive archive/history modal showing all rule modifications (additions, edits, deletions) with timestamps, admin codenames, and categorized action badges.
            * **Admin Clear History with Custom Modal**: Premium animated confirmation modal with pulsing warning icon, danger-styled messaging, and explicit "Delete All" action for admins to permanently clear rules history.
            * **Auto-Hiding Custom Scrollbars**: Applied sleek, 5px auto-hiding scrollbar styling across all modal windows — scrollbar appears only on hover for a clean, distraction-free UI.
            * **Supabase RLS Policy for History Deletion**: Added a dedicated Row-Level Security policy allowing only admin-role users to delete rules history records from the database.

            ### 🚀 What's New in v2.1.2:
            * **Daily Tracking Data Clean up**: Automatically clears saved document tracking hash data from local storage at the start of a new day, preventing local storage bloating over time.
            * **Record Management & UI Refactoring**: Extracted record handling, state hooks, and UI component actions into modular hooks to drastically reduce the complexity of the main dashboard views.

            ### 🚀 What's New in v2.1.1:
            * **Tauri Updater Relaunch Permission Fix**: Added the custom relaunch command to permitted configuration lists, resolving Tauri permission errors during automatic app relaunch on macOS/Windows updates.
            * **Startup Session Timeout Resolution**: Removed the artificial 4-second session and profile retrieval timeout safety nets in the frontend. This prevents premature aborts and infinite page reload loops on slower network connections.
            * **Active Tab Reload Flicker Prevention**: Locked layout transitions until the user profile load completes, eliminating mount-time visual jumping back to the default tab.
            * **Native Dark Background Configuration**: Integrated native window background color options to eliminate white flashes on Windows startup and reload.

            ### 🚀 What's New in v2.1.0:
            * **Outlook Rich HTML Document Saving**: Integrated a "Save File" panel next to "Copy Helper" to paste rich HTML (tables, styles, highlights) from Outlook, select a record to auto-generate the filename, and save as `.docx` documents to today's daily directory (segregated into `Sold/` and `Unsold/` subdirectories for Sales, and directly under base directory for other types).
            * **Lazy Loading & Skeleton Loader Screens**: Extracted heavy panel markups (Copy Helper, Save File, User Management) into modular components, lazy-loaded them alongside main components via React `lazy` to shrink initial bundle sizes, and wrapped them in `Suspense` with bespoke, glassmorphism-themed `SkeletonLoader` presets for stats, tables, forms, logs, rules, and chart cards.
            * **Save File Panel Reload Persistence**: Converted toggle states to React lazy state initializers to prevent mount-time race conditions, ensuring page reloads preserve the active "Save File" helper panel.
            * **Save As Validation & Button Renaming**: Renamed button to "Save As" and added custom states/mutation observers to disable it dynamically when the rich-text editor is empty or no filename record is checked.

            ### 🚀 What's New in v2.0.4:
            * **macOS App Relaunch Error Fix**: Resolved "Relaunch and install failed" updater errors on macOS by routing non-Windows OS relaunches through Tauri's official process plugin (`app.restart()`) instead of spawning raw executables directly inside the sandboxed bundle.
            * **Windows Update Launch Lock & Freeze Resolution**: Fixed Windows auto-updates getting stuck on "Loading, please wait..." or blank white screens due to WebView2 user data folder/SQLite database lock contention by introducing a 1.2-second startup sleep delay.

            ### 🚀 What's New in v2.0.2:
            * **Choice Modal Escape Close**: Added keyboard event listeners to close the SOLD/UNSOLD decision popup on pressing the `Escape` key, letting users edit the form without losing input data.
            * **Dynamic Branch Rules & Fines Relevance Filtering**: Added intelligent relevance matching to filter universal rules/penalties, automatically hiding rules with matching keywords from other companies (e.g. `EUI` or `Second Best Price`) unless their specific company is selected.
            * **Strict Mode Concurrency Lock & Pre-checks**: Implemented module-level seeding lock (`seedingInProgress`) and database verification checks to prevent concurrent duplicate seeding execution in React StrictMode.
            * **Rules State Deduplication & Database Cleanup**: Wrote composite-key client-side deduplication for the rule lists and implemented auto-cleanup script matching for admin user accounts.
            * **React Compiler Compatibility Hook Refactoring**: Rewrote dependency lists of callback hooks to reference root objects directly for proper compiler optimization.

            ### 🚀 What's New in v2.0.1:
            * **Circular Checkboxes & UI Redesign**: Redesigned all permitted category checkboxes and permission checkboxes (e.g. "Can Manage Quote Rules?", "Change Password?") to render as modern, circular, custom-styled check indicators using Check icons, matching dashboard count cards styling.
            * **Escape Key Support**: Added keyboard action listeners so that pressing the `Escape` key closes all active sub-dialogs/modals (Add, Edit, Delete, History) in the Quote Rules and other panels.
            * **Instant Admin Permission Sync**: Resolved layout shift and permission tick mark flicker when opening the user profile modal for admins by deriving checks instantly via direct role checks, and disabled rules checkbox toggling for Admins.
            * **Modern Status Selection Buttons**: Redesigned UNSOLD/SOLD selection buttons in the main record submit form with elegant linear gradients, CheckCircle/XCircle visual icons, and responsive scaling.
            * **Full Codebase Audit & Warning Cleanups**: Resolved all TypeScript and ESLint warnings. Moved static `monthsList` outside the component scope in `AnalyticsPanel.tsx` to eliminate re-creation and resolve missing dependency warnings, cleaned up unused imports and unused references in `QuoteRulesPanel.tsx`, and removed unused variables in `page.tsx`.

            ### 🚀 What's New in v2.0.0:
            * **Quote Rules Panel & Branch Rules Management**: Added a new Quote Rules panel to manage branch-specific rules for specific companies. Features role-based access control, database rules seeding, context-menu actions (edit/delete) for admins, rules change history tracking (`archive_rules_history`), and full audit logging of administrative actions.
            * **MS Word & Outlook Bold Copy Formatting**: Star-marked file names copied via the Copy Helper are now copied using a rich clipboard payload, allowing them to paste directly as bold text in Microsoft Word and Outlook.
            * **Persisted Copy Helper View & Navigation**: Replaced the "Back" button with a modern back icon, and implemented view state persistence so that reloading the browser keeps the user inside the Copy Helper view.
            * **Modal Viewport Centering & UX Fixes**: Replaced redundant hover action icons on cards, added skeleton loader for Quote Rules, and fixed a viewport alignment bug where modals were opening at the bottom of the viewport requiring scrolling.
            * **Core Performance Optimizations**: Lazy-loaded Analytics, Audit Logs, and Quote Rules panels to reduce initial bundle loading by ~131KB. Scoped CSS transitions from every DOM element to only root layout containers to optimize rendering, and wrapped cards with `React.memo` to prevent re-renders.
            * **Critical Bug Fixes**: Fixed bulk delete cache updates bypassing active page filters, and resolved ConfirmModal premature closing during asynchronous actions.

            ### 🚀 What's New in v1.4.2:
            * **Specific User Audit Logs**: Enhanced the `UPDATE_USER` audit logging description. It now performs a smart diff comparison to output only the specific user properties changed (Full Name, Role, or specific file permission items newly Granted or Revoked) instead of listing all 12 allowed file types on every single edit.
            * **Post-Update Reload Freeze Fix**: Removed the legacy frontend self-healing reload workaround on component mount and update-flag setting. The 2-second backend delay relaunch already fully mitigates WebView2 locking, so removing the redundant reload prevents the app from interrupting session initialization and freezing on the loading spinner.

            ### 🚀 What's New in v1.4.1:
            * **System Theme Auto-Toggle**: Detects user's OS color scheme preferences (Windows/macOS) and updates the theme dynamically on the fly with live listeners. Manual toggle selection overrides system preferences and locks in localStorage.
            * **Deferred Success Toasts**: Synchronized all database-connected operations (records creation/updates/deletions, user CRUD, password updates, and onboarding setup) to show success toasts only after Supabase queries execute and dashboard state is refetched/re-rendered.
            * **Audit Log Database Tuning**: Disabled `CREATE_RECORD` logs to save storage space and avoid database bloat from high monthly submission volumes (5,000–10,000 logs). Added logging for `EXPORT_EXCEL` events to track report generation details.
            * **Delayed Windows Relaunch**: Implemented a custom 2-second timeout delay on Windows during automatic updater relaunch. This prevents WebView2 file-locking conflicts that cause the app to freeze on a blank white screen upon auto-starting.

            ### 🚀 What's New in v1.2.0:
            * **Advanced Branch Selector Dropdown**: Built a custom selector dropdown with intelligent sub-options for specific branch variations (e.g. `PRIDE COMPARE` and `EAZY COMPARE`) to prevent spelling errors and simplify input logs.
            * **Period-over-Period (PoP) Comparison Badges**: Integrated automatic growth metrics comparing current Stats cards against previous period limits (previous month/year), rendered as Emerald-Green / Rose-Red glassmorphic badges.
            * **File Category Distribution Breakdown**: Created a full-height, double-column category breakdown component covering all 12 custom file types.
            * **Automated Operational Insights**: Implemented day-by-day averages, dynamic dominant file selectors, and automated textual summaries.
            * **Premium UI Skeleton Loader**: Introduced a custom, pulse-animated skeleton page loader to make page loads feel responsive.

            ### 🚀 What's New in v1.1.0:
            * **Interactive Performance Analytics Dashboard**: Added a custom, zero-dependency SVG-based performance panel displaying real-time metrics, monthly trends with hover tooltips, branch contribution lists, an admin staff leaderboard, and a day-by-day staff progression line chart.
            * **Supabase Recovery & RLS Policy Restoration**: Re-enabled and configured Row-Level Security (RLS) on database tables with strict permission checks, correcting blank dashboard loads.
            * **Admin Password Reset Resolution**: Fixed the PostgREST function overloading conflict (`PGRST203`) by dropping the redundant 2-argument `admin_update_user_credentials` function and writing a unified, 3-argument version.
            * **Self-Healing & Cache Pruning Re-enabled**: Safely restored client-side self-healing checks and active database cache pruning functions to keep the IndexedDB cache aligned with the server.
            * **Snappy UI Deletion**: Optimistically delete records from the local browser cache immediately upon successful deletion for instant visual feedback.

            ### 🚀 What's New in v1.0.0:
            * **PostgREST 1000-Row Pagination Fix**: Added paginated block requests (`.range()`) in both delta fetching and active pruning loops. This prevents older entries (3000+ data sets) from going missing on client systems.
            * **Multi-User Cache Isolation**: Added `clearAllCache` triggers in IndexedDB and hooked it to the logout workflow to prevent data mixing between different accounts.
            * **Network Failure Cache Fallback**: Implemented robust failover catching. In cases where the client indicates it is online but has no database connection (dead routers or server drops), the app falls back to loading local cache instead of throwing blank screen errors.
            * **Tauri Service Worker Skip**: Bypassed service worker registrations inside native desktop apps to eliminate console `SecurityError` protocol warnings.
            * **Offline Guards**: Implemented internet connection validation checks to notify users if they attempt to perform server-only admin actions while offline.

            ### 📋 What's New in v0.3.0:
            * **Silent Background Fetching**: Implemented `isSilent` mode in `fetchRecords` to perform database refetches (real-time subscriptions, window focus/visibility changes, network status changes, and user CRUD actions) silently in the background, keeping existing UI content visible and eliminating full-screen loading spinners.

            ### 📋 Previous Features:
            * **User Management Loader (v0.2.9)**: Added loading spinner state to the "User Accounts & File Permissions Management" table when fetching data to prevent showing 0 records initially.
            * **Code Quality, Performance & Accessibility (v0.2.8)**: Extracted duplicate download logic, optimized date range querying, added WebSocket debouncing, fixed modal escape key dismissal, and fixed spinner dimensions.
            * **Offline Startup & Cache Recovery (v0.2.7)**: Local storage profile caching and fallback startup loaders resolve the infinite loading loop.
            * **Global Reload Keyboard Shortcut & Background Auto-Sync (v0.2.6)**: `Cmd+R` / `Ctrl+R` reload and focus/visibility auto-fetch.
            * **macOS Apple Silicon CI Build Fix (v0.2.5)**: `CI: true` bypasses AppleScript Finder UI-styling hangs.
            * **Self-Healing Startup Delay & Fetching Loader States (v0.2.4)**: 200ms init delay, 4s safety net auto-reload, visual loading spinners.
            * **Deferred Update Installation (v0.2.2)**: Download-only in background, install on explicit "Restart to Update" click.
            * **Maximized Startup, Dynamic Downloads, Supabase Build Injection (v0.2.1)**.
            * **Offline Standalone App, Background Auto-Updater, Accurate Percentages (v0.2.0)**.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
