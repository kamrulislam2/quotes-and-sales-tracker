name: "Build & Release Desktop Apps"

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri App & Publish Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Release v__VERSION__"
          releaseBody: |
            Download the appropriate installer below.

            ### 🚀 What's New in v0.1.8:
            * **Frontend Table Pagination**: Sliced records into pages of 50 logs with modern, user-friendly controls ("Previous", "Next", dynamic visible page numbers, and "Showing X-Y of Z entries") to prevent visual clutter and improve page load performance.
            * **Tauri Desktop Native File Saves**: Configured Tauri wrapper (using `rfd` crate) so that Excel (CSV) and PDF (HTML layout) export buttons open a native platform save dialog inside Windows and macOS applications, preventing silent download failures in WKWebView/WebView2.
            * **Tauri Capabilities & Security**: Configured remote capability URLs and enabled `withGlobalTauri` inside Tauri config to safely authorize Vercel app to invoke native Rust commands.

            ### 📋 Previous Features:
            * **Snappy Paginated Data Fetching**: Implemented page-by-page fetching in chunks of 1,000 using `.range()` inside `fetchRecords` and `fetchAvailableDates` to query all rows matching the filters. This fixes the PostgREST/Supabase default limit of 1,000 records, restoring visibility of older entries (June 1, 3, 4, etc.) on the dashboard.
            * **Reusable CustomEntryModal Component**: Intelligent custom entry modal for admin all-data mode, admin my-data mode, and regular users.
            * **Custom Entry Validation**: Backdated submissions validate required fields and target user's allowed file categories.
            * **Excel & PDF Exports**: Download filtered reports of daily and monthly entries.
            * **Dynamic Stats Grid**: Real-time aggregated stats with double-digit padding and percentages.
            * **Active Tab State Persistence**: Remembers user's selected tab across reloads.
            * **Locked Codename & Half-Width Submit**: Prevents user codename changes with modern form layout.
            * **Custom Entry Button**: Admin's custom entry button next to toggle switch.
            * **Permissive RLS Policies**: Admins can submit backdated entries for other users.
            * **Unified Category Selector**: Consistent category selection across forms.
            * **Advanced Filters**: Search, Year, Month, and Specific Date filters integrated into one card.
            * **21-Day Inactivity Auto-Logout**: Automatic security logoff after 21 days of inactivity.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
