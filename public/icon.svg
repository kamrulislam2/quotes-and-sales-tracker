<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Card with rounded corners -->
  <rect width="512" height="512" rx="128" fill="#020617" />
  <rect width="480" height="480" x="16" y="16" rx="112" fill="url(#bgGrad)" opacity="0.95" />
  
  <!-- Calendar Icon Container -->
  <g transform="translate(96, 106)" filter="url(#glow)">
    <!-- Calendar Body -->
    <rect width="320" height="300" rx="40" fill="#ffffff" />
    <!-- Calendar Header -->
    <path d="M 0 40 Q 0 0, 40 0 L 280 0 Q 320 0, 320 40 L 320 90 L 0 90 Z" fill="#312e81" />
    <!-- Calendar Rings -->
    <rect x="60" y="-20" width="24" height="60" rx="12" fill="#cbd5e1" />
    <rect x="236" y="-20" width="24" height="60" rx="12" fill="#cbd5e1" />
    
    <!-- Calendar Grid / Dots -->
    <circle cx="80" cy="150" r="16" fill="#94a3b8" />
    <circle cx="160" cy="150" r="16" fill="#94a3b8" />
    <circle cx="240" cy="150" r="16" fill="#94a3b8" />
    
    <circle cx="80" cy="220" r="16" fill="#94a3b8" />
    <circle cx="160" cy="220" r="16" fill="#6366f1" />
    <circle cx="240" cy="220" r="16" fill="#94a3b8" />
    
    <!-- Checkmark overlay representing "Chuti" (Approved Leave) -->
    <circle cx="250" cy="230" r="70" fill="#10b981" stroke="#ffffff" stroke-width="8" />
    <path d="M 220 230 L 240 250 L 280 210" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
